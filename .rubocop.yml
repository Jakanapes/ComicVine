AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "coverage/**/*"
    - "pkg/**/*"

# The public API predates this config; style cops that would force churn on
# the existing interface are relaxed. Tighten over time with `rubocop -a`.

Style/StringLiterals:
  Enabled: false

Style/HashSyntax:
  Enabled: false

Style/MethodDefParentheses:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/PerlBackrefs:
  Enabled: false

Style/SpecialGlobalVars:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Metrics/MethodLength:
  Max: 35

Metrics/AbcSize:
  Max: 35

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/PerceivedComplexity:
  Max: 12

Metrics/ClassLength:
  Max: 250

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    - "Rakefile"

Layout/LineLength:
  Max: 140
  Exclude:
    - "spec/**/*"
